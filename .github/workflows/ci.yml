# ci.yml — Continuous Integration workflow
#
# WHY: Automated CI ensures every PR is validated before merge.
# The pipeline enforces the 90%+ test pass rate gate (Phase 7 of the build plan).
# Security scans run in parallel with tests for fast feedback.

name: CI — Build, Test, Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test (JVM)
    runs-on: ubuntu-latest

    services:
      # WHY: Real PostgreSQL for integration tests (not H2/mock)
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tokenization
          POSTGRES_USER: tokenization
          POSTGRES_PASSWORD: tokenization
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        # WHY -Dtokenization.key-provider=local: LocalKeyProvider is
        # @ConditionalOnProperty(havingValue="local"). Without this flag,
        # Spring Boot looks for VaultKeyProvider which requires a live Vault
        # instance — not available in CI. LocalKeyProvider uses in-memory
        # AES-256 keys suitable for running all unit tests.
        run: mvn clean verify -B --no-transfer-progress -Dtokenization.key-provider=local
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'

      # WHY: No separate jacoco:check step needed — the check execution is bound to
      # the verify phase in parent pom.xml pluginManagement. Running jacoco:check
      # directly on the parent POM fails because it has no coverage data (pom packaging).
      # Coverage threshold (90% instruction, 80% branch) is enforced by mvn verify above.

      - name: Upload Surefire test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check
        # WHY: Scans for CVEs in all transitive dependencies
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'data-tokenization'
          path: '.'
          format: 'HTML'

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/

  native-build:
    name: GraalVM Native Image Build
    runs-on: ubuntu-latest
    needs: build-and-test
    # WHY: Native builds run only after JVM tests pass (they are slow)
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - name: Build native image (tokenization-engine)
        # WHY -pl tokenization-engine -am: Build only the engine module and its
        # required dependencies (common, key-management). Building all 5 Spring Boot
        # modules natively in CI would exceed 60+ minutes and GitHub Actions limits.
        # The engine is the most critical module (core FF1 FPE logic) and validates
        # that GraalVM AOT compilation works with Bouncy Castle and Spring Boot 3.x.
        # WHY -DskipTests: Native compilation takes 10+ minutes per module.
        # All tests ran (and passed) in the build-and-test job above.
        # WHY -Dtokenization.key-provider=local: Spring Boot's AOT processing
        # (process-aot goal) starts the application context at build time to
        # generate GraalVM native hints. LocalKeyProvider must be active
        # so the context can start without a live Vault instance in CI.
        run: mvn -Pnative package -pl tokenization-engine -am -B --no-transfer-progress -DskipTests -Dtokenization.key-provider=local
