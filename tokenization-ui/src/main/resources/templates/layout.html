<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  Base layout fragment shared by all pages.
  WHY Thymeleaf fragments: DRY principle — navigation, header, and footer
  are defined once and included in every page template.
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' | Tokenization Admin'">Tokenization Admin</title>
    <!-- Bootstrap 5 via CDN — consider self-hosting in production for CSP compliance -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <style>
        /* WHY custom sidebar: Consistent navigation with role-based menu items */
        .sidebar { width: 220px; min-height: 100vh; background: #1a1a2e; }
        .sidebar a { color: #e0e0e0; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover { background: #16213e; color: #fff; }
        .sidebar .active { background: #0f3460; color: #fff; }
        .badge-security { background-color: #dc3545; }
    </style>
</head>
<nav th:fragment="sidebar" class="sidebar d-flex flex-column p-0">
    <div class="p-3 text-white fw-bold border-bottom border-secondary">
        🔐 Token Admin
    </div>
    <!-- WHY sec:authorize: Role-based menu items shown only to authorized users -->
    <a th:href="@{/dashboard}" th:classappend="${pageTitle == 'Dashboard'} ? 'active'">Dashboard</a>
    <a sec:authorize="hasRole('AUDITOR') or hasRole('ADMIN')"
       th:href="@{/audit}" th:classappend="${pageTitle == 'Audit Logs'} ? 'active'">Audit Logs</a>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/users}" th:classappend="${pageTitle == 'User Management'} ? 'active'">Users</a>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/keys}" th:classappend="${pageTitle == 'Key Management'} ? 'active'">Keys</a>
    <div class="mt-auto p-3 border-top border-secondary">
        <small class="text-muted" sec:authentication="name">user</small>
        <a th:href="@{/logout}" class="btn btn-sm btn-outline-danger mt-1 w-100">Logout</a>
    </div>
</nav>
</html>
