<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout :: head(${pageTitle})}"/>
</head>
<body class="d-flex">
    <th:block th:replace="~{layout :: sidebar}"/>
    <main class="flex-grow-1 p-4">
        <h2>Key Management</h2>
        <div class="alert alert-warning">
            <strong>&#9888;&#65039; High Security Area.</strong>
            Key rotation affects ALL tokenization operations. Coordinate with your security team before rotating.
        </div>
        <div class="card mt-3">
            <div class="card-body">
                <h5>Key Rotation</h5>
                <p>Current key status is loaded from the key management service.</p>
                <!-- WHY CSRF token in form: Key rotation is a destructive operation;
                     CSRF protection prevents malicious sites from triggering rotation -->
                <form method="post" th:action="@{/keys/rotate}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Are you sure you want to rotate the key? This cannot be undone.')">
                        Rotate Key
                    </button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
