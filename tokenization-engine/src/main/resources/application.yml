spring:
  application:
    name: tokenization-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tokenization}
    username: ${DB_USER:tokenization}
    password: ${DB_PASSWORD:tokenization}
    hikari:
      # WHY: Connection pool tuning for high-throughput tokenization (NFR-002: 10,000 TPS)
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

# JWT configuration
jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-256-bits}
  expiration-ms: 3600000  # 1 hour

# Key provider selection
tokenization:
  key-provider: ${KEY_PROVIDER:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
