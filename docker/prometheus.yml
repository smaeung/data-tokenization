global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'tokenization-engine'
    static_configs:
      - targets: ['host.docker.internal:8081']
    metrics_path: /actuator/prometheus

  - job_name: 'tokenization-audit'
    static_configs:
      - targets: ['host.docker.internal:8084']
    metrics_path: /actuator/prometheus

  - job_name: 'tokenization-gateway'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /actuator/prometheus
