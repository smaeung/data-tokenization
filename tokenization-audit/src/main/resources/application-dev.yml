# Dev profile — no Docker required
#
# WHY: Swaps PostgreSQL for H2 in-memory database so the audit service
# starts without Docker. Flyway is disabled because migrations use
# PostgreSQL-specific DDL (TIMESTAMPTZ, ENUM types) incompatible with H2.

spring:
  datasource:
    url: jdbc:h2:mem:tokenization-audit-dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
